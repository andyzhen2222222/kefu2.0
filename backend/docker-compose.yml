services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intellidesk
      POSTGRES_PASSWORD: intellidesk
      POSTGRES_DB: intellidesk
    ports:
      - "5433:5432"
    volumes:
      - intellidesk_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  intellidesk_pg:
